---
# OpenHands PR Review Workflow
#
# To set this up:
#  1. Copy this file to .github/workflows/pr-review.yml in your repository
#  2. Add LLM_API_KEY to repository secrets
#  3. Customize the inputs below as needed
#  4. Commit this file to your repository
#  5. Trigger the review by either:
#     - Adding the "review-this" label to any PR, OR
#     - Requesting openhands-agent as a reviewer
#
# For more information, see:
# https://github.com/OpenHands/software-agent-sdk/tree/main/examples/03_github_workflows/02_pr_review
name: PR Review by OpenHands

on:
    # Trigger when a label is added or a reviewer is requested
    pull_request:
        types: [labeled, review_requested]

permissions:
    contents: read
    pull-requests: write
    issues: write

jobs:
    pr-review:
        # Run when review-this label is added OR openhands-agent is requested as reviewer
        if: |
            github.event.label.name == 'review-this' ||
            github.event.requested_reviewer.login == 'openhands-agent'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout extensions repository
              uses: actions/checkout@v4
              with:
                  repository: OpenHands/extensions
                  ref: main
                  path: extensions

            - name: Checkout PR repository
              uses: actions/checkout@v4
              with:
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  ref: ${{ github.event.pull_request.head.ref }}
                  fetch-depth: 0
                  persist-credentials: false
                  path: pr-repo

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            # Security: this workflow executes untrusted PR content (diff/title/body) via an
            # LLM-powered reviewer agent that can run Bash. GitHub Actions caches are shared
            # across workflows within a repository and can enable cache-poisoning pivots into
            # more-privileged workflows. Keep caching disabled here.
            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                  enable-cache: false

            - name: Install GitHub CLI
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gh

            - name: Install OpenHands dependencies
              shell: bash
              run: |
                  # Install openhands SDK and tools from PyPI
                  uv pip install --system openhands-sdk openhands-tools lmnr

            - name: Run PR review
              shell: bash
              env:
                  LLM_MODEL: anthropic/claude-3-5-sonnet-20240620
                  LLM_BASE_URL: ''
                  REVIEW_STYLE: roasted
                  LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  LMNR_PROJECT_API_KEY: ${{ secrets.LMNR_PROJECT_API_KEY }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  PR_TITLE: ${{ github.event.pull_request.title }}
                  PR_BODY: ${{ github.event.pull_request.body }}
                  PR_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
                  PR_HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
                  REPO_NAME: ${{ github.repository }}
              run: |
                  cd pr-repo
                  uv run python ../extensions/plugins/pr-review/scripts/agent_script.py

            - name: Upload logs as artifact
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: openhands-pr-review-logs
                  path: |
                      *.log
                      output/
                  retention-days: 7
