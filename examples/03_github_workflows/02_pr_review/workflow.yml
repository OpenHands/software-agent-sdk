---
# OpenHands PR Review Workflow
#
# To set this up:
#  1. Copy this file to .github/workflows/pr-review.yml in your repository
#  2. Add secrets to your repository (see below for local vs cloud mode)
#  3. Customize the inputs below as needed
#  4. Commit this file to your repository
#  5. Trigger the review by either:
#     - Adding the "review-this" label to any PR, OR
#     - Requesting openhands-agent as a reviewer
#
# Mode options:
#  - local (default): Runs the agent in GitHub Actions. Requires LLM_API_KEY.
#  - cloud: Runs the agent on OpenHands Cloud. Requires OPENHANDS_API_KEY + LLM_API_KEY.
#    The agent runs asynchronously on Cloud infrastructure.
#
# For more information, see:
# https://github.com/OpenHands/software-agent-sdk/tree/main/examples/03_github_workflows/02_pr_review
name: PR Review by OpenHands

on:
    # Trigger when a label is added or a reviewer is requested
    pull_request:
        types: [labeled, review_requested]

permissions:
    contents: read
    pull-requests: write
    issues: write

jobs:
    pr-review:
        # Run when review-this label is added OR openhands-agent is requested as reviewer
        if: |
            github.event.label.name == 'review-this' ||
            github.event.requested_reviewer.login == 'openhands-agent'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout for composite action
              uses: actions/checkout@v4
              with:
                  repository: OpenHands/software-agent-sdk
                  # Use a specific version tag or branch (e.g., 'v1.0.0' or 'main')
                  ref: main
                  sparse-checkout: .github/actions/pr-review

            # --- Option A: Local mode (default) ---
            # Agent runs in GitHub Actions. Requires LLM_API_KEY secret.
            - name: Run PR Review
              uses: ./.github/actions/pr-review
              with:
                  # LLM model(s) to use. Can be comma-separated for A/B testing
                  # - one model will be randomly selected per review
                  llm-model: anthropic/claude-sonnet-4-5-20250929
                  llm-base-url: ''
                  # Review style: roasted (other option: standard)
                  review-style: roasted
                  # SDK version to use (version tag or branch name)
                  sdk-version: main
                  # Secrets
                  llm-api-key: ${{ secrets.LLM_API_KEY }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            # --- Option B: Cloud mode ---
            # Uncomment below (and comment out Option A) to use OpenHands Cloud.
            # Agent runs asynchronously on Cloud infrastructure. Requires OPENHANDS_API_KEY + LLM_API_KEY.
            # - name: Run PR Review (Cloud)
            #   uses: ./.github/actions/pr-review
            #   with:
            #       mode: cloud
            #       review-style: roasted
            #       sdk-version: main
            #       llm-api-key: ${{ secrets.LLM_API_KEY }}
            #       openhands-api-key: ${{ secrets.OPENHANDS_API_KEY }}
            #       github-token: ${{ secrets.GITHUB_TOKEN }}
