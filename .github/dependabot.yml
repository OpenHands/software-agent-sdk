---
# Dependabot configuration for automated dependency updates
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # Python dependencies (uv-managed workspace)
    - package-ecosystem: pip
      directory: /
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 10
      groups:
      # Group minor/patch updates to reduce PR noise
          python-minor-patch:
              patterns:
                  - '*'
              update-types:
                  - minor
                  - patch
      commit-message:
          prefix: chore(deps)

  # GitHub Actions
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 5
      groups:
          actions:
              patterns:
                  - '*'
      commit-message:
          prefix: chore(deps)

  # npm dependencies (VSCode extension)
    - package-ecosystem: npm
      directory: /openhands-agent-server/openhands/agent_server/vscode_extensions/openhands-settings
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 5
      groups:
          npm-deps:
              patterns:
                  - '*'
      commit-message:
          prefix: chore(deps)
