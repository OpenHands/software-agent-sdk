---
name: PR Artifacts Fork Cleanup

on:
    workflow_run:
        workflows: [PR Artifacts]
        types: [completed]

permissions:
    actions: read
    contents: write
    issues: write
    pull-requests: write

jobs:
    cleanup-fork-on-approval:
        if: github.event.workflow_run.event == 'pull_request_review' && github.event.workflow_run.conclusion == 'success'
        runs-on: ubuntu-latest
        steps:
            - name: Resolve approved fork PR
              id: resolve
              uses: actions/github-script@v9
              with:
                  script: |
                      const run = context.payload.workflow_run;
                      const pullRequests = run.pull_requests || [];
                      if (pullRequests.length === 0) {
                        core.notice('Workflow run is not associated with a pull request.');
                        core.setOutput('should_cleanup', 'false');
                        return;
                      }

                      const { owner, repo } = context.repo;
                      const prNumber = pullRequests[0].number;

                      const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
                        owner,
                        repo,
                        run_id: run.id,
                        per_page: 100,
                      });
                      const approvalJob = jobs.jobs.find((job) => job.name === 'cleanup-on-approval');
                      if (!approvalJob || approvalJob.conclusion !== 'success') {
                        core.notice('The completed PR Artifacts run was not an approval cleanup run.');
                        core.setOutput('should_cleanup', 'false');
                        return;
                      }

                      const { data: pr } = await github.rest.pulls.get({
                        owner,
                        repo,
                        pull_number: prNumber,
                      });

                      const isFork = pr.head.repo.full_name !== pr.base.repo.full_name;
                      if (!isFork) {
                        core.notice('Non-fork PRs are cleaned by the primary PR Artifacts workflow.');
                        core.setOutput('should_cleanup', 'false');
                        return;
                      }

                      if (!pr.maintainer_can_modify) {
                        core.warning('Fork PR does not allow maintainer edits; cannot auto-remove .pr/.');
                        core.setOutput('should_cleanup', 'false');
                        return;
                      }

                      core.setOutput('should_cleanup', 'true');
                      core.setOutput('pr_number', String(prNumber));
                      core.setOutput('head_repo', pr.head.repo.full_name);
                      core.setOutput('head_ref', pr.head.ref);

            - name: Check cleanup token
              if: steps.resolve.outputs.should_cleanup == 'true'
              env:
                  BOT_TOKEN: ${{ secrets.OPENHANDS_BOT_GITHUB_PAT_PUBLIC }}
              run: |
                  if [ -z "$BOT_TOKEN" ]; then
                    echo "::error::OPENHANDS_BOT_GITHUB_PAT_PUBLIC is required to clean fork PR artifacts"
                    exit 1
                  fi

            - uses: actions/checkout@v6
              if: steps.resolve.outputs.should_cleanup == 'true'
              with:
                  repository: ${{ steps.resolve.outputs.head_repo }}
                  ref: ${{ steps.resolve.outputs.head_ref }}
                  token: ${{ secrets.OPENHANDS_BOT_GITHUB_PAT_PUBLIC }}

            - name: Remove .pr/ directory from fork branch
              id: remove
              if: steps.resolve.outputs.should_cleanup == 'true'
              env:
                  HEAD_REF: ${{ steps.resolve.outputs.head_ref }}
              run: |
                  git check-ref-format --branch "$HEAD_REF"
                  if [ -d ".pr" ]; then
                    git config user.name "allhands-bot"
                    git config user.email "allhands-bot@users.noreply.github.com"
                    git rm -rf .pr/
                    git commit \
                      -m "chore: Remove PR-only artifacts [automated]" \
                      -m "Co-authored-by: openhands <openhands@all-hands.dev>"
                    git push origin "HEAD:${HEAD_REF}"
                    echo "removed=true" >> $GITHUB_OUTPUT
                    echo "::notice::Removed .pr/ directory from fork branch"
                  else
                    echo "removed=false" >> $GITHUB_OUTPUT
                    echo "::notice::No .pr/ directory to remove"
                  fi

            - name: Update PR comment after cleanup
              if: steps.resolve.outputs.should_cleanup == 'true' && steps.remove.outputs.removed == 'true'
              uses: actions/github-script@v9
              with:
                  script: |
                      const marker = '<!-- pr-artifacts-notice -->';
                      const body = `${marker}
                      ✅ **PR Artifacts Cleaned Up**

                      The \`.pr/\` directory has been automatically removed from the fork PR branch.
                      `;

                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: Number('${{ steps.resolve.outputs.pr_number }}'),
                      });

                      const existing = comments.find((comment) => comment.body.includes(marker));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      }
