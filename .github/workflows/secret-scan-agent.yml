name: Secret Scan Agent

on:
  workflow_dispatch:
    inputs:
      scan_window_days:
        description: "Number of days to look back (must match cron interval to avoid overlap)"
        required: false
        default: "4"
        type: string
      tracking_repo:
        description: "Repository for the tracking issue (owner/repo)"
        required: false
        default: "OpenHands/evaluation"
        type: string
      tracking_issue:
        description: "Issue number to post findings on (leave empty to auto-resolve)"
        required: false
        default: ""
        type: string
      gcs_buckets:
        description: "Comma-separated GCS bucket names to scan"
        required: false
        default: "openhands-evaluation-logs,openhands-artifacts"
        type: string
  schedule:
    # Every 4 days at midnight UTC (days 1,5,9,13,17,21,25,29 of each month)
    - cron: "0 0 */4 * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: secret-scan-agent
  cancel-in-progress: false  # never cancel a running security scan

jobs:
  secret-scan:
    # Only run scheduled jobs in the main repository, not in forks
    if: github.repository == 'OpenHands/software-agent-sdk' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      SCAN_WINDOW_DAYS: ${{ github.event.inputs.scan_window_days || '4' }}
      TRACKING_REPO: ${{ github.event.inputs.tracking_repo || 'OpenHands/evaluation' }}
      TRACKING_ISSUE_INPUT: ${{ github.event.inputs.tracking_issue || '' }}
      GCS_BUCKETS: ${{ github.event.inputs.gcs_buckets || 'openhands-evaluation-logs,openhands-artifacts' }}
      LLM_MODEL: litellm_proxy/claude-sonnet-4-5-20250929
      LLM_BASE_URL: https://llm-proxy.app.all-hands.dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install OpenHands dependencies
        run: |
          # Pin to a release tag for stability in this security-critical workflow
          SDK_REF="v1.12.0"
          uv pip install --system "openhands-sdk @ git+https://github.com/OpenHands/agent-sdk.git@${SDK_REF}#subdirectory=openhands-sdk"
          uv pip install --system "openhands-tools @ git+https://github.com/OpenHands/agent-sdk.git@${SDK_REF}#subdirectory=openhands-tools"

      - name: Install gcloud CLI
        run: |
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | \
            sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | \
            sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          sudo apt-get update -qq && sudo apt-get install -y -qq google-cloud-cli

      - name: Authenticate to GCP
        if: ${{ secrets.GCP_SA_KEY != '' }}
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          KEY_FILE=$(mktemp)
          trap 'rm -f "$KEY_FILE"' EXIT
          echo "$GCP_SA_KEY" > "$KEY_FILE"
          gcloud auth activate-service-account --key-file="$KEY_FILE"

      - name: Compute scan time window
        id: timewindow
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Read last scan timestamp from repo variable (ensures no overlap)
          LAST_TS=$(gh variable get LAST_SECRET_SCAN_TS --repo "${{ github.repository }}" 2>/dev/null || echo "")

          TO_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [[ -n "$LAST_TS" ]]; then
            FROM_TS="$LAST_TS"
            echo "Using stored last-scan timestamp: $FROM_TS"
          else
            FROM_TS=$(date -u -d "-${SCAN_WINDOW_DAYS} days" +"%Y-%m-%dT%H:%M:%SZ")
            echo "No stored timestamp, using window of ${SCAN_WINDOW_DAYS} days: $FROM_TS"
          fi

          echo "from=$FROM_TS" >> "$GITHUB_OUTPUT"
          echo "to=$TO_TS" >> "$GITHUB_OUTPUT"
          echo "Scan window: $FROM_TS -> $TO_TS"

      - name: Resolve or create tracking issue
        id: tracking
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [[ -n "$TRACKING_ISSUE_INPUT" ]]; then
            echo "issue=$TRACKING_ISSUE_INPUT" >> "$GITHUB_OUTPUT"
            echo "Using provided tracking issue: ${TRACKING_REPO}#${TRACKING_ISSUE_INPUT}"
          else
            # Check for a stored tracking issue number
            STORED_ISSUE=$(gh variable get SECRET_SCAN_TRACKING_ISSUE --repo "${{ github.repository }}" 2>/dev/null || echo "")
            if [[ -n "$STORED_ISSUE" ]]; then
              echo "issue=$STORED_ISSUE" >> "$GITHUB_OUTPUT"
              echo "Using stored tracking issue: ${TRACKING_REPO}#${STORED_ISSUE}"
            else
              # Create new tracking issue
              ISSUE_URL=$(gh issue create \
                --repo "$TRACKING_REPO" \
                --title "Automated Secret Scan Tracking" \
                --label "security" \
                --body "$(cat <<'EOF'
          ## Automated Secret Scan Tracking

          This issue tracks findings from the automated secret scanning agent.

          The agent scans:
          - **Datadog production logs** for plaintext credentials, API keys, and tokens
          - **GCS artifact buckets** for sensitive data in uploaded logs and artifacts

          Each scan posts a comment below with its findings. When leaks are detected, the agent creates fix PRs and links them here.

          **Parent incident:** #383

          ---
          *Managed by [secret-scan-agent](https://github.com/OpenHands/software-agent-sdk/blob/main/.github/workflows/secret-scan-agent.yml)*
          EOF
              )")
              ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
              echo "issue=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
              echo "Created tracking issue: ${TRACKING_REPO}#${ISSUE_NUMBER}"

              # Store for future runs
              gh variable set SECRET_SCAN_TRACKING_ISSUE \
                --repo "${{ github.repository }}" \
                --body "$ISSUE_NUMBER"
            fi
          fi

      - name: Check required configuration
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "Error: LLM_API_KEY secret is not set."
            exit 1
          fi
          if [ -z "$DD_API_KEY" ] || [ -z "$DD_APP_KEY" ]; then
            echo "Warning: DD_API_KEY or DD_APP_KEY not set. Datadog scanning will fail."
          fi
          echo "LLM model: $LLM_MODEL"
          echo "Scan window: ${{ steps.timewindow.outputs.from }} -> ${{ steps.timewindow.outputs.to }}"
          echo "Tracking issue: ${TRACKING_REPO}#${{ steps.tracking.outputs.issue }}"

      - name: Make scripts executable
        run: chmod +x scripts/secret-scan/*.sh

      - name: Run secret scan orchestrator
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
          DD_SITE: datadoghq.com
          GCS_BUCKETS: ${{ env.GCS_BUCKETS }}
          FROM_TIMESTAMP: ${{ steps.timewindow.outputs.from }}
          TO_TIMESTAMP: ${{ steps.timewindow.outputs.to }}
          TRACKING_REPO: ${{ env.TRACKING_REPO }}
          TRACKING_ISSUE: ${{ steps.tracking.outputs.issue }}
          PYTHONPATH: ""
        run: |
          echo "Running secret scan orchestrator agent..."
          cd scripts/secret-scan
          uv run python agent_script.py

      - name: Update last scan timestamp
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Store the TO timestamp so the next run picks up exactly where we left off
          gh variable set LAST_SECRET_SCAN_TS \
            --repo "${{ github.repository }}" \
            --body "${{ steps.timewindow.outputs.to }}"
          echo "Stored last scan timestamp: ${{ steps.timewindow.outputs.to }}"

      # Only upload orchestrator logs on failure — never scan results,
      # which may contain partial secrets even after redaction.
      - name: Upload orchestrator logs
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: secret-scan-logs-${{ github.run_id }}
          path: |
            scripts/secret-scan/*.log
          retention-days: 7
