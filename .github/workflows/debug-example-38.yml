---
name: Debug Example 38 (Browser Session Recording)

on:
    workflow_dispatch:
        inputs:
            reason:
                description: Reason for manual trigger
                required: false
                default: 'Debug example 38 browser session recording in CI'

permissions:
    contents: read
    pull-requests: write
    issues: write

jobs:
    debug-example-38:
        runs-on: ubuntu-24.04
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true
                  python-version: '3.13'

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Setup Apptainer
              uses: eWaterCycle/setup-apptainer@v2
              with:
                  apptainer-version: 1.3.6

            - name: Install Chromium
              run: |
                  sudo apt-get update
                  sudo apt-get install -y chromium-browser

            - name: Install project dependencies
              run: uv sync --frozen --group dev

            - name: Install OpenHands CLI
              run: uv tool install openhands --python 3.12

            - name: Debug example 38 with OpenHands agent
              env:
                  LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
                  LLM_MODEL: litellm_proxy/claude-sonnet-4-6
                  LLM_BASE_URL: https://llm-proxy.app.all-hands.dev
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  openhands --override-with-envs --headless -t "
                  You are debugging a CI failure for example 38 (browser session recording) in the OpenHands agent-sdk repository (PR #2316 at https://github.com/OpenHands/agent-sdk/pull/2316).

                  The example is at: examples/01_standalone_sdk/38_browser_session_recording.py
                  The browser tool implementation is at: openhands-tools/openhands/tools/browser_use/impl.py

                  The problem: Example 38 works locally but times out or fails in this GitHub Actions CI environment (ubuntu-24.04). We need to understand exactly why.

                  Please do the following steps:

                  1. First, gather environment info:
                     - Run 'which chromium-browser' and 'chromium-browser --version'
                     - Run 'which google-chrome' or check other chrome binaries
                     - Check if playwright chromium is installed: find ~/.cache/ms-playwright -name chrome 2>/dev/null
                     - Run 'uname -a' and check the environment
                     - Check 'echo \$DISPLAY' and headless display availability

                  2. Try running the example with a timeout:
                     - Set LLM_API_KEY, LLM_MODEL, and LLM_BASE_URL environment variables (they should already be set)
                     - Run: cd /workspace && timeout 180 uv run python examples/01_standalone_sdk/38_browser_session_recording.py 2>&1
                     - Capture the full output and any error messages

                  3. If the example fails or times out, investigate:
                     - Does chromium-browser support CDP (Chrome DevTools Protocol)?
                     - Try: chromium-browser --headless --disable-gpu --remote-debugging-port=9222 about:blank &
                     - Then check: curl -s http://localhost:9222/json/version
                     - Kill the process after checking
                     - Look at what _ensure_chromium_available() in impl.py returns
                     - Check if there are sandbox issues (the CI runs as root sometimes)

                  4. After your investigation, post your findings as a comment on PR #2316.
                     Use the GitHub API with the GITHUB_TOKEN environment variable:
                     curl -X POST https://api.github.com/repos/OpenHands/agent-sdk/issues/2316/comments \
                       -H \"Authorization: token \$GITHUB_TOKEN\" \
                       -H \"Content-Type: application/json\" \
                       -d '{\"body\": \"YOUR_FINDINGS_HERE\"}'

                  Your comment should include:
                  - What chrome/chromium binaries are available and their versions
                  - Whether CDP works with the installed chromium
                  - The exact error or behavior when running the example
                  - Any suggested code changes to fix the issue
                  - Full logs from your investigation
                  "
