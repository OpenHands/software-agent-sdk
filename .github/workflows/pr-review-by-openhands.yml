---
name: PR Review by OpenHands

on:
    # TEMPORARY MITIGATION (Clinejection hardening)
    #
    # We temporarily avoid `pull_request_target` here. We'll restore it after the PR review
    # workflow is fully hardened for untrusted execution.
    pull_request:
        types: [opened, ready_for_review, labeled, review_requested]

permissions:
    contents: read
    pull-requests: write
    issues: write

jobs:
    pr-review:
        # Note: fork PRs will not have access to repository secrets under `pull_request`.
        # Skip forks to avoid noisy failures until we restore a hardened `pull_request_target` flow.
        if: |
            github.event.pull_request.head.repo.full_name == github.repository &&
            (
                (github.event.action == 'opened' && github.event.pull_request.draft == false) ||
                github.event.action == 'ready_for_review' ||
                (github.event.action == 'labeled' && github.event.label.name == 'review-this') ||
                (
                    github.event.action == 'review_requested' &&
                    (
                        github.event.requested_reviewer.login == 'openhands-agent' ||
                        github.event.requested_reviewer.login == 'all-hands-bot'
                    )
                )
            )
        concurrency:
            group: pr-review-${{ github.event.pull_request.number }}
            cancel-in-progress: true
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout extensions repository
              uses: actions/checkout@v4
              with:
                  repository: OpenHands/extensions
                  ref: main
                  path: extensions

            - name: Checkout PR repository
              uses: actions/checkout@v4
              with:
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  ref: ${{ github.event.pull_request.head.ref }}
                  fetch-depth: 0
                  persist-credentials: false
                  path: pr-repo

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            # Security: this workflow executes untrusted PR content (diff/title/body) via an
            # LLM-powered reviewer agent that can run Bash. GitHub Actions caches are shared
            # across workflows within a repository and can enable cache-poisoning pivots into
            # more-privileged workflows. Keep caching disabled here.
            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                  enable-cache: false

            - name: Install GitHub CLI
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gh

            - name: Install OpenHands dependencies
              shell: bash
              run: |
                  # Install openhands SDK and tools from PyPI
                  uv pip install --system openhands-sdk openhands-tools lmnr

            - name: Run PR review
              shell: bash
              env:
                  LLM_MODEL: litellm_proxy/claude-sonnet-4-5-20250929
                  LLM_BASE_URL: https://llm-proxy.app.all-hands.dev
                  REVIEW_STYLE: roasted
                  LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
                  GITHUB_TOKEN: ${{ secrets.ALLHANDS_BOT_GITHUB_PAT }}
                  LMNR_PROJECT_API_KEY: ${{ secrets.LMNR_SKILLS_API_KEY }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  PR_TITLE: ${{ github.event.pull_request.title }}
                  PR_BODY: ${{ github.event.pull_request.body }}
                  PR_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
                  PR_HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
                  REPO_NAME: ${{ github.repository }}
              run: |
                  cd pr-repo
                  uv run python ../extensions/plugins/pr-review/scripts/agent_script.py

            - name: Upload logs as artifact
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: openhands-pr-review-logs
                  path: |
                      *.log
                      output/
                  retention-days: 7

            - name: Upload Laminar trace info for evaluation
              uses: actions/upload-artifact@v4
              if: success()
              with:
                  name: pr-review-trace-${{ github.event.pull_request.number }}
                  path: pr-repo/laminar_trace_info.json
                  retention-days: 30
                  if-no-files-found: ignore
